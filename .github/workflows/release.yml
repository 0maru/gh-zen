name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build extension release assets
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build and upload release assets
        uses: cli/gh-extension-precompile@v2
        with:
          go_version_file: go.mod
